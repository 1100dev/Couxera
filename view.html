<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title id="page-title">Certificado</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
    :root { --bg:#090909; --dark:#0d1321; --muted:#5a5a6a; --cert-bg:#f5f4f0; }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center;
      padding: 2.5rem 1rem 3rem;
    }

    /* BG */
    .bg-pattern { position: fixed; inset: 0; z-index: 0; }
    .bg-pattern svg { width:100%; height:100%; }
    .vignette {
      position: fixed; inset: 0; z-index: 1;
      background: radial-gradient(ellipse at center, transparent 20%, rgba(0,0,0,0.75) 100%);
      pointer-events: none;
    }

    /* Certificate Box A4 proportion landscape (approx 1.414) */
    .cert-frame {
      position: relative; z-index: 2;
      width: 100%; max-width: 1020px;
      aspect-ratio: 1.414 / 1;
      background: var(--cert-bg);
      color: var(--dark);
      padding: 3rem 4rem;
      box-shadow: 0 30px 60px rgba(0,0,0,0.6);
      display: flex; flex-direction: column; justify-content: space-between;
      box-sizing: border-box;
      border: 18px solid var(--dark);
      outline: 2px solid #c9a063;
      outline-offset: -10px;
      overflow: hidden;
    }

    /* Corner Slots */
    .corner-slot { position: absolute; width: 85px; height: 85px; z-index: 5; }
    .corner-slot img { width: 100%; height: 100%; object-fit: contain; }
    .c-left { left: 15px; top: 15px; }
    .c-right { right: 15px; top: 15px; }

    /* Top Logo Row */
    .cert-header { display: flex; justify-content: center; align-items: center; min-height: 55px; margin-bottom: 1.5rem; }
    .cert-logo { max-height: 55px; max-width: 220px; object-fit: contain; }
    .cert-logo.invert-logo { filter: brightness(0) cubic-bezier(0,0,0,0); } /* Forces black */
    .logo-text { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--dark); letter-spacing: 2px; }

    /* Main Core Text */
    .cert-body { text-align: center; display: flex; flex-direction: column; justify-content: center; flex: 1; }
    .txt-certify { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; color: #c9a063; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 0.5rem; }
    .txt-name { font-family: 'DM Serif Display', serif; font-size: 3.8rem; font-style: italic; color: var(--dark); margin: 0.5rem 0 1rem; line-height: 1.1; }
    .txt-lead { font-size: 1.05rem; color: var(--muted); font-weight: 400; max-width: 750px; margin: 0 auto; line-height: 1.6; }
    .txt-course { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; color: var(--dark); letter-spacing: 1px; margin: 0.75rem 0; text-transform: uppercase; }

    /* Footer Row */
    .cert-footer { display: flex; justify-content: space-between; align-items: flex-end; margin-top: 2rem; border-top: 1px solid rgba(0,0,0,0.06); padding-top: 1.5rem; }
    .meta-side { width: 220px; font-size: 0.85rem; color: var(--muted); }
    .meta-side p { margin-bottom: 0.25rem; }
    .meta-side strong { color: var(--dark); font-weight: 500; }

    .sig-center { text-align: center; width: 260px; display: flex; flex-direction: column; align-items: center; }
    .sig-line { width: 100%; height: 1px; background: rgba(0,0,0,0.2); margin-bottom: 0.5rem; }
    .sig-wrap { height: 50px; width: 180px; margin-bottom: 0.25rem; display: flex; align-items: center; justify-content: center; }
    .sig-name { font-size: 0.95rem; font-weight: 600; color: var(--dark); }
    .sig-role { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

    /* Actions Floating Boxes (Screen only) */
    .floating-box { position: relative; z-index: 10; width: 100%; max-width: 1020px; margin-top: 1.5rem; background: #121212; border: 1px solid rgba(255,255,255,0.08); padding: 1.25rem; border-radius: 8px; display: none; justify-content: space-between; align-items: center; gap: 1rem; }
    .floating-box.visible { display: flex; }
    .notice-text { color: #aaa; font-size: 0.9rem; }
    .notice-text strong { color: #fff; }
    .action-row { display: flex; gap: 0.5rem; flex: 1; max-width: 500px; }
    .action-row input { flex: 1; background: #1a1a1a; border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; padding: 0.5rem; color: #fff; font-size: 0.8rem; }
    .btn-action { background: #fff; color: #000; border: none; padding: 0.5rem 1rem; border-radius: 4px; font-size: 0.85rem; font-weight: 600; cursor: pointer; white-space: nowrap; }
    .btn-action:hover { opacity: 0.9; }
    .btn-close { background: transparent; color: #666; border: none; font-size: 1.2rem; cursor: pointer; padding: 0 0.25rem; }
    .btn-close:hover { color: #fff; }

    @media print {
      body { background: #fff; padding: 0; margin: 0; }
      .bg-pattern, .vignette, .floating-box { display: none !important; }
      .cert-frame { box-shadow: none; border-width: 15px; max-width: 100%; width: 100%; height: 99vh; aspect-ratio: 1.414 / 1; }
    }
  </style>
</head>
<body>

  <div class="bg-pattern">
    <svg xmlns="http://www.w3.org/2000/svg">
      <rect width="100%" height="100%" fill="var(--bg)"/>
      <rect width="100%" height="100%" fill="url(#hex)"/>
    </svg>
  </div>
  <div class="vignette"></div>

  <!-- MARCO DE CERTIFICADO -->
  <div class="cert-frame" id="cert-printable">
    <!-- Corner slots custom decor -->
    <div class="corner-slot c-left" id="cert-left-slot"></div>
    <div class="corner-slot c-right" id="cert-right-slot"></div>

    <div class="cert-header" id="cert-header-slot">
      <!-- Se inyectará logo o texto dinámico -->
    </div>

    <div class="cert-body">
      <div class="txt-certify">Certificado de Finalización</div>
      <div class="txt-name" id="cert-name">---</div>
      <div class="txt-lead" id="cert-subtitle">---</div>
      <div class="txt-course" id="cert-course">---</div>
    </div>

    <div class="cert-footer">
      <div class="meta-side">
        <p>Duración académica: <strong id="cert-hours">---</strong></p>
        <p>ID de Validación: <strong id="cert-verify">---</strong></p>
      </div>
      
      <div class="sig-center">
        <div class="sig-wrap" id="cert-sig-img-wrap"></div>
        <div class="sig-line"></div>
        <div class="sig-name" id="cert-signame">---</div>
        <div class="sig-role" id="cert-sigrole">---</div>
      </div>

      <div class="meta-side" style="text-align: right;">
        <p>Fecha de Emisión</p>
        <p><strong id="cert-date">---</strong></p>
      </div>
    </div>
  </div>

  <!-- FLOATING SHARE BOX (Solamente visible en navegador) -->
  <div class="floating-box" id="link-box">
    <div class="notice-text">Estás viendo la vista previa de validación pública. <strong>Puedes imprimirlo directamente (Ctrl+P)</strong>.</div>
    <div class="action-row">
      <input type="text" id="link-input" readonly />
      <button class="btn-action" onclick="copyLink()">Copiar Enlace</button>
      <button class="btn-action" style="background:#222; color:#fff; border:1px solid #333;" onclick="window.print()">Imprimir</button>
    </div>
    <button class="btn-close" onclick="closeLinkBox()">×</button>
  </div>

  <script>
    const $ = id => document.getElementById(id);

    function loadFromSource(){
      // CORRECCIÓN CENTRAL: Extrae el payload guardado de localStorage de forma segura
      const localData = localStorage.getItem('cert_payload');
      if(!localData) return false;
      try {
        return JSON.parse(localData);
      } catch(e) {
        return false;
      }
    }

    function renderCert(data) {
      $('page-title').textContent = `Certificado - ${data.name}`;
      $('cert-name').textContent = data.name;
      $('cert-course').textContent = data.course;
      $('cert-subtitle').textContent = data.subtitle;
      $('cert-hours').textContent = data.hours;
      $('cert-verify').textContent = data.verify;
      $('cert-signame').textContent = data.signame;
      $('cert-sigrole').textContent = data.sigrole;

      // Set standard clean date
      const options = { year: 'numeric', month: 'long', day: 'numeric' };
      $('cert-date').textContent = new Date().toLocaleDateString('es-ES', options);

      // Logo rendering logic
      if(data.logo) {
        const invertClass = data.logoInvert ? 'invert-logo' : '';
        $('cert-header-slot').innerHTML = `<img src="${data.logo}" class="cert-logo ${invertClass}" alt="Logo"/>`;
      } else {
        $('cert-header-slot').innerHTML = `<span class="logo-text">${data.logoText}</span>`;
      }

      // Signature image
      if(data.sig){
        $('cert-sig-img-wrap').innerHTML =
          `<img src="${data.sig}" alt="Firma" style="max-height:100%;max-width:100%;object-fit:contain;mix-blend-mode:multiply;"/>`;
      }

      // Left corner image
      if(data.left){
        $('cert-left-slot').innerHTML = `<img src="${data.left}" alt=""/>`;
      }

      // Right corner image
      if(data.right){
        $('cert-right-slot').innerHTML = `<img src="${data.right}" alt=""/>`;
      }
    }

    function copyLink(){
      const input = $('link-input');
      input.select();
      navigator.clipboard.writeText(input.value).catch(()=>{});
      const btn = input.nextElementSibling;
      btn.textContent = '✓ Copiado';
      setTimeout(()=> btn.textContent = 'Copiar Enlace', 2000);
    }

    function closeLinkBox(){
      $('link-box').classList.remove('visible');
    }

    // Init process
    const certData = loadFromSource();
    if(certData){
      renderCert(certData);
      $('link-input').value = location.href;
      $('link-box').classList.add('visible');
    } else {
      document.body.innerHTML = `<div style="color:#fff; padding:3rem; font-family:sans-serif; text-align:center;">
        <h2>No se encontraron datos del certificado</h2>
        <p style="color:#666; margin-top:1rem;">Por favor, genera un certificado primero desde el panel de control.</p>
      </div>`;
    }
  </script>
</body>
</html>
