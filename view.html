<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title id="page-title">Certificado</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
    :root { --bg:#090909; --dark:#0d1321; --muted:#5a5a6a; --cert-bg:#f5f4f0; }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center;
      padding: 2.5rem 1rem 3rem;
    }

    /* BG */
    .bg-pattern { position: fixed; inset: 0; z-index: 0; }
    .bg-pattern svg { width:100%; height:100%; }
    .vignette {
      position: fixed; inset: 0; z-index: 1;
      background: radial-gradient(ellipse at center, transparent 20%, rgba(0,0,0,0.82) 100%);
      pointer-events: none;
    }

    /* Top bar (Control Admin) */
    .topbar {
      position: relative; z-index: 10;
      width: 100%; max-width: 860px;
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.5rem;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .topbar-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: .95rem;
      letter-spacing: .14em;
      color: rgba(255,255,255,0.3);
    }
    .btn-group { display: flex; gap: .6rem; flex-wrap: wrap; }
    .btn {
      font-family: 'DM Sans', sans-serif;
      font-size: .68rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      font-weight: 600;
      padding: .55rem 1.2rem;
      border-radius: 4px;
      cursor: pointer;
      border: none;
      transition: opacity .2s, transform .15s;
      text-decoration: none;
      display: inline-flex; align-items: center; gap: .4rem;
    }
    .btn:hover { opacity: .82; transform: translateY(-1px); }
    .btn-primary { background: #fff; color: #0d1321; }
    .btn-outline  { background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.2); }

    /* Link box */
    .link-box {
      position: relative; z-index: 10;
      width: 100%; max-width: 860px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      padding: .9rem 1.1rem;
      display: none;
      align-items: center;
      gap: .6rem;
      margin-bottom: 1.2rem;
      flex-wrap: wrap;
    }
    .link-box.visible { display: flex; }
    .link-box input {
      flex: 1;
      min-width: 200px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 3px;
      color: rgba(255,255,255,0.7);
      font-family: 'DM Sans', sans-serif;
      font-size: .75rem;
      padding: .4rem .7rem;
      outline: none;
    }
    .link-notice {
      position: relative; z-index: 10;
      width: 100%; max-width: 860px;
      font-size: .65rem;
      color: rgba(255,255,255,0.25);
      letter-spacing: .04em;
      margin-bottom: .8rem;
      line-height: 1.6;
      display: none;
    }
    .link-notice.visible { display: block; }

    /* Cert wrap responsivo */
    .cert-wrap { position: relative; z-index: 3; width: 100%; max-width: 860px; }

    .cert {
      background: var(--cert-bg);
      width: 100%;
      aspect-ratio: 1.414;
      position: relative;
      overflow: hidden;
      border-radius: 4px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6);
      display: flex; flex-direction: column;
    }
    .cert-bg-svg { position: absolute; inset: 0; z-index: 0; }
    .cert-bg-svg svg { width:100%; height:100%; }
    
    .cert-frame {
      position: absolute; inset: 12px; z-index: 1;
      border: 1.5px solid rgba(13,19,33,0.12);
      pointer-events: none;
    }
    .cert-frame::before {
      content:''; position: absolute; inset: 5px;
      border: .5px solid rgba(13,19,33,0.06);
    }

    /* header - Logo a la Derecha superior (Estilo Coursera) */
    .cert-header {
      position: relative; z-index: 2;
      padding: 3% 4% 0;
      display: flex; align-items: center; justify-content: flex-end;
      min-height: 10%;
    }
    #cert-logo-area {
      display: flex; align-items: center; justify-content: flex-end;
      width: clamp(120px, 22vw, 180px); height: clamp(35px, 6vw, 50px);
    }
    #cert-logo-area img {
      display: block; width: 100%; height: 100%;
      object-fit: contain; object-position: right center;
    }
    .logo-text {
      color: var(--dark); font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.1rem, 3vw, 1.8rem); letter-spacing: .06em;
    }

    /* body principal */
    .cert-body {
      position: relative; z-index: 2; flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start;
      padding: 0 6% 3%;
      text-align: center;
    }
    
    .cert-name { font-family:'DM Serif Display', serif; font-size: clamp(1.8rem, 4.8vw, 3.5rem); color: var(--dark); line-height: 1.1; margin-bottom: 0.5%; }
    .cert-completed { font-size: clamp(.6rem, 1.3vw, .85rem); color: var(--muted); font-weight: 400; margin-bottom: 0.5%; }
    .cert-course { font-family:'DM Serif Display', serif; font-size: clamp(1.2rem, 3.2vw, 2.3rem); color: var(--dark); font-weight: 700; line-height: 1.2; margin-bottom: 1.5%; }
    .cert-subtitle { font-size: clamp(.55rem, 1.15vw, .75rem); color: var(--muted); max-width: 90%; line-height: 1.5; margin-bottom: 2%; }
    
    /* Bloque de Metadatos (Duración e ID de Certificación) */
    .cert-meta-block {
      margin-bottom: 3.5%;
      font-size: clamp(.52rem, 1.1vw, .72rem);
      line-height: 1.6;
      color: var(--dark);
    }
    .meta-label { color: var(--muted); }

    /* ── DISEÑO NUEVO: BLOQUE DE FIRMA DIGITALIZADA CENTRAL SUPERIOR ── */
    .cert-signature-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 320px;
      margin-top: 0.5%;
    }
    
    #cert-sig-img-wrap {
      height: clamp(55px, 9vw, 75px);
      width: 100%;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      margin-bottom: 0.4rem;
    }
    #cert-sig-img-wrap img { max-height: 100%; max-width: 100%; object-fit: contain; mix-blend-mode: multiply; }
    
    .cert-sig-line { width: 100%; height: 1px; background: rgba(13,19,33,0.25); margin-bottom: 0.5rem; }
    .cert-sig-name { font-family: 'DM Serif Display', serif; font-size: clamp(1rem, 2.2vw, 1.5rem); color: var(--dark); font-weight: 700; line-height: 1.2; }
    .cert-sig-role { font-size: clamp(.55rem, 1.2vw, .78rem); color: var(--muted); margin-top: 0.1rem; font-weight: 400; }

    /* footer limpio e institucional */
    .cert-footer {
      position: relative; z-index: 2;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 5% 4%;
    }
    
    /* Slots decorativos reducidos al footer */
    .cert-left-img, .cert-right-img {
      width: clamp(40px, 7vw, 60px); aspect-ratio: 1; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; overflow: hidden;
      opacity: 0.8;
    }
    .cert-left-img img, .cert-right-img img { width: 100%; height: 100%; object-fit: contain; display: block; }
    
    /* Insignia de Estrella (Footer Derecho por defecto) */
    .badge-star-ui {
      width: 100%; height: 100%; border-radius: 50%; border: 1.5px solid var(--dark);
      display: flex; align-items: center; justify-content: center; position: relative;
    }
    .badge-star-ui svg { width: 42%; fill: none; stroke: var(--dark); stroke-width: 2; }

    .cert-verify {
      text-align: center; font-size: clamp(.38rem, .8vw, .55rem); color: rgba(90,90,106,0.5);
      letter-spacing: 0.02em; line-height: 1.4;
    }

    /* empty state */
    .empty-state {
      position: relative; z-index: 3;
      text-align: center; color: rgba(255,255,255,0.2);
      font-size: .8rem; margin-top: 3rem;
      letter-spacing: .06em; line-height: 2;
    }

    /* Ajustes adaptativos para móviles */
    @media (max-width: 650px) {
      .cert { aspect-ratio: unset; min-height: 580px; padding-top: 1rem; }
      .cert-frame { inset: 8px; }
      .cert-body { padding: 0 4% 2%; }
      .cert-signature-container { max-width: 240px; }
    }

    @media print {
      * { -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }
      html, body { background:white !important; padding:0 !important; margin:0 !important; }
      .bg-pattern, .vignette, .topbar, .link-box, .link-notice { display:none !important; }
      .cert-wrap { max-width:100% !important; width:100% !important; margin:0 !important; padding:0 !important; }
      .cert { box-shadow:none !important; border-radius:0 !important; width:100% !important; aspect-ratio:1.414 !important; page-break-inside:avoid; }
    }
  </style>
</head>
<body>

<div class="bg-pattern">
  <svg viewBox="0 0 600 600" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <pattern id="hexbg" x="0" y="0" width="120" height="104" patternUnits="userSpaceOnUse">
        <polygon points="60,2 118,32 118,72 60,102 2,72 2,32" fill="none" stroke="rgba(255,255,255,0.055)" stroke-width="0.8"/>
        <line x1="60" y1="2"  x2="60" y2="52"  stroke="rgba(255,255,255,0.04)" stroke-width="0.6"/>
        <line x1="2"  y1="32" x2="60" y2="52"  stroke="rgba(255,255,255,0.04)" stroke-width="0.6"/>
        <line x1="118" y1="32" x2="60" y2="52" stroke="rgba(255,255,255,0.04)" stroke-width="0.6"/>
      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="#090909"/>
    <rect width="100%" height="100%" fill="url(#hexbg)"/>
  </svg>
</div>
<div class="vignette"></div>

<div class="topbar">
  <span class="topbar-label">Vista del Certificado</span>
  <div class="btn-group">
    <button class="btn btn-outline" onclick="window.history.back()">← Volver a editar</button>
    <button class="btn btn-primary" onclick="window.print()">🖨 Imprimir / PDF</button>
  </div>
</div>

<div class="link-box" id="link-box">
  <input type="text" id="link-input" readonly/>
  <button class="btn btn-primary" onclick="copyLink()">Copiar</button>
  <button class="btn btn-outline" onclick="closeLinkBox()">✕</button>
</div>
<p class="link-notice" id="link-notice">
  ℹ️ Los datos del certificado han sido recuperados con éxito.
</p>

<div class="cert-wrap">
  <div class="cert" id="certificate">
    <div class="cert-bg-svg">
      <svg viewBox="0 0 860 608" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <pattern id="hexcert" x="0" y="0" width="100" height="86" patternUnits="userSpaceOnUse">
            <polygon points="50,2 98,27 98,62 50,84 2,62 2,27" fill="none" stroke="rgba(13,19,33,0.04)" stroke-width="0.8"/>
          </pattern>
        </defs>
        <rect width="100%" height="100%" fill="#f5f4f0"/>
        <rect width="100%" height="100%" fill="url(#hexcert)"/>
      </svg>
    </div>
    <div class="cert-frame"></div>

    <div class="cert-header">
      <div id="cert-logo-area"></div>
    </div>

    <div class="cert-body">
      <p class="cert-name" id="c-name"></p>
      <p class="cert-completed">successfully completed the</p>
      <p class="cert-course" id="c-course"></p>
      <p class="cert-subtitle" id="c-subtitle"></p>
      
      <div class="cert-meta-block">
        <div><span class="meta-label">Duration:</span> <span id="c-hours"></span></div>
        <div><span class="meta-label">Certification ID:</span> <span id="c-verify-id"></span></div>
