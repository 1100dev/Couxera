<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title id="page-title">Certificado</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
    :root { --bg:#090909; --dark:#0d1321; --muted:#5a5a6a; --cert-bg:#f5f4f0; }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex; 
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 1rem;
    }

    .bg-pattern { position: fixed; inset: 0; z-index: 0; }
    .bg-pattern svg { width:100%; height:100%; }
    .vignette {
      position: fixed; inset: 0; z-index: 1;
      background: radial-gradient(ellipse at center, transparent 20%, rgba(0,0,0,0.82) 100%);
      pointer-events: none;
    }

    .cert-wrap { position: relative; z-index: 3; width: 100%; max-width: 860px; }
    .cert { background: var(--cert-bg); width: 100%; aspect-ratio: 1.414; position: relative; overflow: hidden; border-radius: 4px; box-shadow: 0 32px 80px rgba(0,0,0,0.6); display: flex; flex-direction: column; }
    
    .cert-bg-image { position: absolute; inset: 0; z-index: 0; width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
    .cert-frame { position: absolute; inset: 12px; z-index: 1; border: 1.5px solid rgba(13,19,33,0.12); pointer-events: none; }
    .cert-frame::before { content:''; position: absolute; inset: 5px; border: .5px solid rgba(13,19,33,0.06); }

    .cert-header { position: relative; z-index: 2; padding: 4% 4% 0; display: flex; align-items: center; justify-content: center; min-height: 10%; }
    #cert-logo-area { display: flex; align-items: center; justify-content: center; width: clamp(140px, 25vw, 220px); height: clamp(40px, 7vw, 60px); }
    #cert-logo-area img { display: block; max-width: 100%; max-height: 100%; object-fit: contain; object-position: center; }
    .logo-text { color: var(--dark); font-family: 'Bebas Neue', sans-serif; font-size: clamp(1.3rem, 3.5vw, 2.2rem); letter-spacing: .06em; }

    .cert-body { position: relative; z-index: 2; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 2% 6% 1%; text-align: center; }
    .cert-name { font-family:'DM Serif Display', serif; font-size: clamp(1.8rem, 4.8vw, 3.5rem); color: var(--dark); line-height: 1.1; margin-bottom: 0.5%; }
    .cert-completed { font-size: clamp(.6rem, 1.3vw, .85rem); color: var(--muted); font-weight: 400; margin-bottom: 0.5%; }
    .cert-course { font-family:'DM Serif Display', serif; font-size: clamp(1.2rem, 3.2vw, 2.3rem); color: var(--dark); font-weight: 700; line-height: 1.2; margin-bottom: 1.5%; }
    .cert-subtitle { font-size: clamp(.55rem, 1.15vw, .75rem); color: var(--muted); max-width: 90%; line-height: 1.5; margin-bottom: 2%; }
    
    .cert-meta-block { margin-bottom: 3.5%; font-size: clamp(.52rem, 1.1vw, .72rem); line-height: 1.6; color: var(--dark); }
    .meta-label { color: var(--muted); }

    .cert-signature-container { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; max-width: 320px; margin-top: 0.5%; }
    #cert-sig-img-wrap { height: clamp(55px, 9vw, 75px); width: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 0.4rem; }
    #cert-sig-img-wrap img { max-height: 100%; max-width: 100%; object-fit: contain; mix-blend-mode: multiply; }
    #cert-sig-img-wrap img[src=""], #cert-sig-img-wrap img:not([src]) { display: none !important; }
    
    .cert-sig-line { width: 100%; height: 1px; background: rgba(13,19,33,0.25); margin-bottom: 0.5rem; }
    .cert-sig-name { font-family: 'DM Serif Display', serif; font-size: clamp(1rem, 2.2vw, 1.5rem); color: var(--dark); font-weight: 700; line-height: 1.2; }
    .cert-sig-role { font-size: clamp(.55rem, 1.2vw, .78rem); color: var(--muted); margin-top: 0.1rem; font-weight: 400; }

    .cert-footer { position: relative; z-index: 2; display: flex; align-items: center; justify-content: space-between; padding: 0 5% 4%; }
    .cert-left-img { width: clamp(50px, 9vw, 75px); aspect-ratio: 1; flex-shrink: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .cert-left-img img { width: 100%; height: 100%; object-fit: contain; display: block; }
    .cert-left-img img[src=""], .cert-left-img img:not([src]) { display: none !important; }
    
    .cert-verify { text-align: center; font-size: clamp(.38rem, .8vw, .55rem); color: rgba(90,90,106,0.5); letter-spacing: 0.02em; line-height: 1.4; flex: 1; padding: 0 2rem; }
    .cert-right-img { width: clamp(45px, 8vw, 65px); aspect-ratio: 1; flex-shrink: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .cert-right-img img { width: 100%; height: 100%; object-fit: contain; display: block; }
    .cert-right-img img[src=""], .cert-right-img img:not([src]) { display: none !important; }
    
    .badge-star-ui { width: 100%; height: 100%; border-radius: 50%; border: 1.5px solid var(--dark); display: flex; align-items: center; justify-content: center; position: relative; }
    .badge-star-ui svg { width: 42%; fill: none; stroke: var(--dark); stroke-width: 2; }

    .empty-state { position: relative; z-index: 3; text-align: center; color: rgba(255,255,255,0.4); font-size: .9rem; margin-top: 4rem; letter-spacing: .06em; line-height: 2; }
    .empty-state a { color: #fff; text-decoration: underline; margin-top: 10px; display: inline-block; }

    @media (max-width: 650px) {
      .cert { aspect-ratio: unset; min-height: 600px; padding-top: 1rem; }
      .cert-frame { inset: 8px; }
      .cert-body { padding: 0 4% 2%; }
      .cert-signature-container { max-width: 240px; }
    }

    @media print {
      * { -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }
      html, body { background:white !important; padding:0 !important; margin:0 !important; }
      .bg-pattern, .vignette { display:none !important; }
      .cert-wrap { max-width:100% !important; width:100% !important; margin:0 !important; padding:0 !important; }
      .cert { box-shadow:none !important; border-radius:0 !important; width:100% !important; aspect-ratio:1.414 !important; page-break-inside:avoid; }
    }
  </style>
</head>
<body>

<div class="bg-pattern">
  <svg viewBox="0 0 600 600" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <pattern id="hexbg" x="0" y="0" width="120" height="104" patternUnits="userSpaceOnUse">
        <polygon points="60,2 118,32 118,72 60,102 2,72 2,32" fill="none" stroke="rgba(255,255,255,0.055)" stroke-width="0.8"/>
        <line x1="60" y1="2"  x2="60" y2="52"  stroke="rgba(255,255,255,0.04)" stroke-width="0.6"/>
        <line x1="2"  y1="32" x2="60" y2="52"  stroke="rgba(255,255,255,0.04)" stroke-width="0.6"/>
        <line x1="118" y1="32" x2="60" y2="52" stroke="rgba(255,255,255,0.04)" stroke-width="0.6"/>
      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="#090909"/>
    <rect width="100%" height="100%" fill="url(#hexbg)"/>
  </svg>
</div>
<div class="vignette"></div>

<div class="cert-wrap">
  <div class="cert" id="certificate">
    <img src="images/fondo.svg" class="cert-bg-image" alt="Fondo"/>
    <div class="cert-frame"></div>

    <div class="cert-header">
      <div id="cert-logo-area"></div>
    </div>

    <div class="cert-body">
      <p class="cert-name" id="c-name"></p>
      <p class="cert-completed">successfully completed the</p>
      <p class="cert-course" id="c-course"></p>
      <p class="cert-subtitle" id="c-subtitle"></p>
      
      <div class="cert-meta-block">
        <div><span class="meta-label">Duration:</span> <span id="c-hours"></span></div>
        <div><span class="meta-label">Certification ID:</span> <span id="c-verify-id"></span></div>
      </div>

      <div class="cert-signature-container">
        <div id="cert-sig-img-wrap"></div>
        <div class="cert-sig-line"></div>
        <p class="cert-sig-name" id="c-signame"></p>
        <p class="cert-sig-role" id="c-sigrole"></p>
      </div>
    </div>

    <div class="cert-footer">
      <div class="cert-left-img" id="cert-left-slot"></div>
      
      <p class="cert-verify">
        Verify this certification at:<br>
        <span id="c-verify-url"></span>
      </p>
      
      <div class="cert-right-img" id="cert-right-slot">
        <div class="badge-star-ui">
          <svg viewBox="0 0 24 24">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
          </svg>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
function $(id){ return document.getElementById(id); }

function loadFromSource(){
  const hashId = location.hash.slice(1).trim();
  if (!hashId) return null;

  try {
    const decoded = decodeURIComponent(escape(atob(hashId)));
    if (decoded.startsWith('{')) {
      return JSON.parse(decoded);
    }
  } catch(e) {
    const localData = localStorage.getItem('cert_' + hashId);
    if (localData) return JSON.parse(localData);
  }

  const fallbackData = localStorage.getItem('cert_payload');
  if (fallbackData) return JSON.parse(fallbackData);

  return null;
}

function renderCert(data){
  $('c-name').textContent       = data.name     || '';
  $('c-course').textContent     = data.course   || '';
  $('c-subtitle').textContent   = data.subtitle || '';
  $('c-hours').textContent      = data.hours    || '';
  $('c-verify-id').textContent  = data.verify   || 'N/A';
  $('c-signame').textContent    = data.signame  || '';
  $('c-sigrole').textContent    = data.sigrole  || '';
  
  $('c-verify-url').textContent = window.location.href;
  
  document.title = (data.name || 'Certificado') + ' — Certificado';
  $('page-title').textContent = document.title;

  if(data.logo && data.logo.trim() !== ""){
    $('cert-logo-area').innerHTML = `<img src="${data.logo}" alt="Logo" style="filter:${data.logoInvert?'brightness(0)':'none'};" onerror="this.style.display='none'"/>`;
  } else if(data.logoText){
    $('cert-logo-area').innerHTML = `<span class="logo-text">${data.logoText}</span>`;
  } else {
    $('cert-logo-area').innerHTML = `<span class="logo-text">CERTIFICATE</span>`;
  }

  if(data.sig && data.sig.trim() !== ""){
    $('cert-sig-img-wrap').innerHTML = `<img src="${data.sig}" alt="Firma" onerror="this.parentNode.innerHTML='<span class=sig-fallback>Digital Signature</span>'"/>`;
  } else {
    $('cert-sig-img-wrap').innerHTML = `<span style="font-size:0.65rem; color:rgba(0,0,0,0.25); letter-spacing:0.1em; text-transform:uppercase;">Digital Signature</span>`;
  }

  if(data.left && data.left.trim() !== ""){
    $('cert-left-slot').innerHTML = `<img src="${data.left}" alt="QR" onerror="this.style.display='none'"/>`;
  } else {
    $('cert-left-slot').innerHTML = `<div style="width:100%; height:100%; border:1px dashed rgba(0,0,0,0.1); display:flex; align-items:center; justify-content:center; font-size:0.5rem; color:var(--muted);">QR</div>`;
  }

  if(data.right && data.right.trim() !== ""){
    $('cert-right-slot').innerHTML = `<img src="${data.right}" alt="Sello" onerror="this.style.display='none'"/>`;
  }
}

const certData = loadFromSource();

if(certData){
  renderCert(certData);
} else {
  document.querySelector('.cert-wrap').innerHTML =
    `<div class="empty-state">
      ⚠️ No se encontraron datos válidos para este certificado.<br>
      <a href="certificate.html">← Abrir el Editor de Certificados</a>
    </div>`;
}
</script>
</body>
</html>
