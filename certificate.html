<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Certificado</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
    :root {
      --bg: #090909;
      --cert-bg: #f5f4f0;
      --dark: #0d1321;
      --muted: #5a5a6a;
    }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 3rem;
    }

    /* BG */
    .bg-pattern { position: fixed; inset: 0; z-index: 0; }
    .bg-pattern svg { width:100%; height:100%; }
    .vignette {
      position: fixed; inset: 0; z-index: 1;
      background: radial-gradient(ellipse at center, transparent 20%, rgba(0,0,0,0.7) 100%);
      pointer-events: none;
    }

    /* Form & Container */
    .container { position: relative; z-index: 2; width: 100%; max-width: 700px; background: #121212; border: 1px solid rgba(255,255,255,0.08); padding: 2.5rem; border-radius: 12px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
    h1 { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; color: #fff; letter-spacing: 1px; margin-bottom: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 0.5rem; }
    
    .form-group { margin-bottom: 1.25rem; }
    .form-row { display: flex; gap: 1rem; }
    .form-row .form-group { flex: 1; }
    
    label { display: block; color: #a0a0a0; font-size: 0.85rem; font-weight: 500; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.5px; }
    input[type="text"], textarea { width: 100%; background: #1a1a1a; border: 1px solid rgba(255,255,255,0.12); border-radius: 6px; padding: 0.75rem; color: #fff; font-family: inherit; font-size: 0.95rem; transition: all 0.2s ease; }
    input[type="text"]:focus, textarea:focus { outline: none; border-color: #fff; background: #222; }
    textarea { height: 70px; resize: none; }
    
    .checkbox-group { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem; }
    .checkbox-group input { cursor: pointer; }
    .checkbox-group label { margin-bottom: 0; text-transform: none; cursor: pointer; }

    /* Custom File Input button style */
    .file-input-wrapper { position: relative; margin-top: 0.25rem; }
    .file-label { display: block; background: #222; border: 1px dashed rgba(255,255,255,0.2); padding: 0.75rem; text-align: center; border-radius: 6px; cursor: pointer; color: #ccc; font-size: 0.9rem; transition: background 0.2s; }
    .file-label:hover { background: #2a2a2a; color: #fff; }
    .file-input-wrapper input[type="file"] { position: absolute; left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }
    .file-preview { margin-top: 0.5rem; font-size: 0.8rem; color: #888; display: flex; align-items: center; gap: 0.5rem; }
    .file-preview img { max-height: 30px; border-radius: 4px; background: #fff; padding: 2px; }

    button.btn-primary { width: 100%; background: #ffffff; color: #000; border: none; padding: 0.9rem; border-radius: 6px; font-weight: 600; font-size: 1rem; cursor: pointer; margin-top: 1.5rem; transition: opacity 0.2s; }
    button.btn-primary:hover { opacity: 0.9; }

    /* Result Box */
    .result-box { display: none; margin-top: 2rem; padding: 1.5rem; background: #161616; border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; animation: fadeIn 0.3s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .result-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; color: #fff; margin-bottom: 0.75rem; letter-spacing: 0.5px; }
    .input-copy-group { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .input-copy-group input { flex: 1; background: #0c0c0c; border: 1px solid rgba(255,255,255,0.2); padding: 0.75rem; border-radius: 6px; color: #888; font-size: 0.85rem; }
    .btn-sec { background: #2a2a2a; color: #fff; border: 1px solid rgba(255,255,255,0.1); padding: 0.75rem 1.2rem; border-radius: 6px; cursor: pointer; font-size: 0.9rem; font-weight: 500; white-space: nowrap; }
    .btn-sec:hover { background: #3a3a3a; }
    .btn-action-view { display: block; text-align: center; background: #fff; color: #000; padding: 0.8rem; border-radius: 6px; font-weight: 600; text-decoration: none; font-size: 0.95rem; }
    .btn-action-view:hover { opacity: 0.9; }
  </style>
</head>
<body>

  <!-- BG Geometric Isométrico SVG -->
  <div class="bg-pattern">
    <svg xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="hex" width="116" height="200" patternUnits="userSpaceOnUse" patternTransform="scale(0.35)">
          <polygon points="58,0 116,33.5 116,100.5 58,134 0,100.5 0,33.5" fill="none" stroke="rgba(255,255,255,0.035)" stroke-width="0.8"/>
          <polygon points="58,67 116,100.5 116,167.5 58,201 0,167.5 0,100.5" fill="none" stroke="rgba(255,255,255,0.035)" stroke-width="0.8"/>
          <line x1="58" y1="0" x2="58" y2="67" stroke="rgba(255,255,255,0.025)" stroke-width="0.6"/>
          <line x1="116" y1="33.5" x2="58" y2="67" stroke="rgba(255,255,255,0.025)" stroke-width="0.6"/>
          <line x1="0" y1="33.5" x2="58" y2="67" stroke="rgba(255,255,255,0.025)" stroke-width="0.6"/>
          <line x1="58" y1="134" x2="58" y2="201" stroke="rgba(255,255,255,0.025)" stroke-width="0.6"/>
          <line x1="116" y1="167.5" x2="58" y2="201" stroke="rgba(255,255,255,0.025)" stroke-width="0.6"/>
          <line x1="0" y1="167.5" x2="58" y2="201" stroke="rgba(255,255,255,0.025)" stroke-width="0.6"/>
          <polygon points="58,67 116,100.5 116,134 58,100.5 0,134 0,100.5" fill="none" stroke="rgba(255,255,255,0.055)" stroke-width="0.8"/>
          <line x1="58" y1="67" x2="58" y2="100" stroke="rgba(255,255,255,0.04)" stroke-width="0.6"/>
          <line x1="0" y1="100.5" x2="58" y2="100" stroke="rgba(255,255,255,0.04)" stroke-width="0.6"/>
          <line x1="116" y1="100.5" x2="58" y2="100" stroke="rgba(255,255,255,0.04)" stroke-width="0.6"/>
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="var(--bg)"/>
      <rect width="100%" height="100%" fill="url(#hex)"/>
    </svg>
  </div>
  <div class="vignette"></div>

  <div class="container">
    <h1>Creador de Certificados</h1>
    
    <div class="form-group">
      <label for="ed-name">Nombre del Alumno</label>
      <input type="text" id="ed-name" value="Juan Perez Gomez"/>
    </div>

    <div class="form-group">
      <label for="ed-course">Nombre del Curso / Logro</label>
      <input type="text" id="ed-course" value="Master Avanzado en Inteligencia Artificial"/>
    </div>

    <div class="form-group">
      <label for="ed-subtitle">Subtítulo / Descripción Detallada</label>
      <textarea id="ed-subtitle">Por haber cumplido satisfactoriamente con todos los módulos académicos, evaluaciones prácticas y proyectos especiales diseñados para la especialización técnica y despliegue de modelos masivos.</textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="ed-hours">Horas Académicas</label>
        <input type="text" id="ed-hours" value="120 horas"/>
      </div>
      <div class="form-group">
        <label for="ed-verify">Código de Verificación / ID</label>
        <input type="text" id="ed-verify" value="CERT-2026-AI984"/>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="ed-signame">Nombre del Firmante</label>
        <input type="text" id="ed-signame" value="Dra. Elena Rostova"/>
      </div>
      <div class="form-group">
        <label for="ed-sigrole">Cargo del Firmante</label>
        <input type="text" id="ed-sigrole" value="Directora de Innovación y Tecnología"/>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="ed-logotext">Texto Alternativo del Logo</label>
        <input type="text" id="ed-logotext" value="NEXUS LABS"/>
        <div class="checkbox-group">
          <input type="checkbox" id="ed-logo-invert"/>
          <label for="ed-logo-invert">Invertir color del logo a oscuro en certificado</label>
        </div>
      </div>
    </div>

    <!-- IMÁGENES (Subida Base64) -->
    <div class="form-row" style="margin-top:0.5rem;">
      <div class="form-group">
        <label>Logo de Organización</label>
        <div class="file-input-wrapper">
          <div class="file-label" id="lbl-logo">Subir Logo (PNG/SVG)</div>
          <input type="file" id="file-logo" accept="image/*"/>
        </div>
        <div class="file-preview" id="pre-logo"></div>
      </div>
      <div class="form-group">
        <label>Firma Autorizada</label>
        <div class="file-input-wrapper">
          <div class="file-label" id="lbl-sig">Subir Firma (Fondo Transparente)</div>
          <input type="file" id="file-sig" accept="image/*"/>
        </div>
        <div class="file-preview" id="pre-sig"></div>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Marca de Esquina Izquierda</label>
        <div class="file-input-wrapper">
          <div class="file-label" id="lbl-left">Subir Imagen Izq. (Opcional)</div>
          <input type="file" id="file-left" accept="image/*"/>
        </div>
        <div class="file-preview" id="pre-left"></div>
      </div>
      <div class="form-group">
        <label>Marca de Esquina Derecha</label>
        <div class="file-input-wrapper">
          <div class="file-label" id="lbl-right">Subir Imagen Der. (Opcional)</div>
          <input type="file" id="file-right" accept="image/*"/>
        </div>
        <div class="file-preview" id="pre-right"></div>
      </div>
    </div>

    <button class="btn-primary" onclick="generateLink()">Guardar y Generar Enlace</button>

    <div class="result-box" id="link-result">
      <div class="result-title">¡Certificado Guardado Exitosamente!</div>
      <div class="input-copy-group">
        <input type="text" id="link-output" readonly/>
        <button class="btn-sec" onclick="copyGenLink()">Copiar Enlace</button>
      </div>
      <a href="#" class="btn-action-view" id="link-open" target="_blank">Ir a la Vista del Certificado</a>
    </div>
  </div>

  <script>
    const $ = id => document.getElementById(id);
    const _imgs = { logo: '', sig: '', left: '', right: '' };

    function bindFile(inputId, storageKey, labelId, previewId) {
      $(inputId).addEventListener('change', function(e) {
        const file = e.target.files[0];
        if(!file) return;
        $(labelId).textContent = '✓ Archivo Cargado';
        $(labelId).style.borderColor = 'rgba(255,255,255,0.4)';
        
        const reader = new FileReader();
        reader.onload = function(evt) {
          _imgs[storageKey] = evt.target.result;
          $(previewId).innerHTML = `<img src="${evt.target.result}" alt="Preview"/> <span>${file.name}</span>`;
        };
        reader.readAsDataURL(file);
      });
    }

    bindFile('file-logo', 'logo', 'lbl-logo', 'pre-logo');
    bindFile('file-sig', 'sig', 'lbl-sig', 'pre-sig');
    bindFile('file-left', 'left', 'lbl-left', 'pre-left');
    bindFile('file-right', 'right', 'lbl-right', 'pre-right');

    function generateLink(){
      const data = {
        name:       $('ed-name').value,
        course:     $('ed-course').value,
        subtitle:   $('ed-subtitle').value,
        hours:      $('ed-hours').value,
        signame:    $('ed-signame').value,
        sigrole:    $('ed-sigrole').value,
        verify:     $('ed-verify').value,
        logoText:   $('ed-logotext').value,
        logoInvert: $('ed-logo-invert').checked,
        logo:       _imgs.logo,
        sig:        _imgs.sig,
        left:       _imgs.left,
        right:      _imgs.right,
      };

      // Guardamos el payload en localStorage para evitar URLs masivas que rompen Vercel
      try {
        localStorage.setItem('cert_payload', JSON.stringify(data));
      } catch(e) {
        alert("Las imágenes cargadas superan el espacio disponible del navegador. Intenta optimizarlas.");
        return;
      }

      // RESOLUCIÓN DEL 404: Lógica de enrutamiento robusta compatible con entornos locales y Vercel Production
      const origin = window.location.origin;
      const path = window.location.pathname;
      
      // Extrae el directorio base de forma segura sin importar si termina en / o en archivo
      const baseDir = path.substring(0, path.lastIndexOf('/')) + '/';
      const url = origin + baseDir + 'view.html';

      const box = $('link-result');
      const input = $('link-output');
      const openBtn = $('link-open');
      
      input.value = url;
      openBtn.href = url;
      box.style.display = 'block';
      input.select();
      box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function copyGenLink(){
      const input = $('link-output');
      input.select();
      navigator.clipboard.writeText(input.value).catch(()=>{});
      const btn = input.nextElementSibling;
      btn.textContent = '✓ Copiado';
      setTimeout(()=> btn.textContent = 'Copiar Enlace', 2000);
    }
  </script>
</body>
</html>
