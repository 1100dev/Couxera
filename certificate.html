<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Editor de Certificados</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
    body { background: #090909; font-family: 'DM Sans', sans-serif; color: #fff; padding: 2rem 1rem; display: flex; flex-direction: column; align-items: center; }
    
    .container { width: 100%; max-width: 600px; background: #121212; border: 1px solid rgba(255,255,255,0.08); padding: 2rem; border-radius: 8px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
    h1 { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; letter-spacing: 0.05em; margin-bottom: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: .5rem; }
    
    .form-group { margin-bottom: 1.2rem; display: flex; flex-direction: column; gap: .4rem; }
    label { font-size: .8rem; color: rgba(255,255,255,0.6); font-weight: 500; text-transform: uppercase; letter-spacing: .05em; }
    input[type="text"], textarea { background: #1a1a1a; border: 1px solid rgba(255,255,255,0.15); border-radius: 4px; padding: .6rem .8rem; color: #fff; font-family: inherit; font-size: .9rem; outline: none; transition: border .2s; }
    input[type="text"]:focus, textarea:focus { border-color: #fff; }
    
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .checkbox-group { display: flex; align-items: center; gap: .5rem; margin-top: .5rem; }
    
    .btn-submit { background: #fff; color: #000; font-weight: 600; text-transform: uppercase; font-size: .85rem; letter-spacing: .1em; padding: .8rem; border: none; border-radius: 4px; margin-top: 1.5rem; cursor: pointer; width: 100%; transition: opacity .2s; }
    .btn-submit:hover { opacity: .9; }
    
    .result-box { background: rgba(255,255,255,0.03); border: 1px dashed rgba(255,255,255,0.15); padding: 1.2rem; border-radius: 6px; margin-top: 1.5rem; display: none; }
    .result-title { font-size: .85rem; font-weight: 600; text-transform: uppercase; color: #fff; margin-bottom: .6rem; }
    .result-actions { display: flex; gap: .5rem; margin-top: .6rem; }
    .btn-small { padding: .4rem .8rem; font-size: .75rem; border-radius: 3px; cursor: pointer; text-decoration: none; font-weight: 500; }
    .btn-small.primary { background: #fff; color: #000; border: none; }
    .btn-small.outline { background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.2); }
    
    .prefix-info { font-size: 0.7rem; color: rgba(255,255,255,0.3); margin-top: -0.2rem; }
  </style>
</head>
<body>

<div class="container">
  <h1>Editor de Certificado</h1>
  
  <div class="form-group">
    <label>Nombre del Alumno</label>
    <input type="text" id="ed-name" placeholder="Ej. Juan Pérez Gómez"/>
  </div>
  
  <div class="form-group">
    <label>Nombre del Curso / Máster</label>
    <input type="text" id="ed-course" placeholder="Ej. Máster Avanzado en Inteligencia Artificial"/>
  </div>
  
  <div class="form-group">
    <label>Descripción / Subtítulo</label>
    <textarea id="ed-subtitle" rows="2" placeholder="Por haber cumplido satisfactoriamente con todos los módulos..."></textarea>
  </div>
  
  <div class="row">
    <div class="form-group">
      <label>Duración</label>
      <input type="text" id="ed-hours" placeholder="Ej. 120 horas"/>
    </div>
    <div class="form-group">
      <label>ID de Certificación (Slug URL de Respaldo)</label>
      <input type="text" id="ed-verify" placeholder="Ej. CERT-PREVIEW"/>
    </div>
  </div>
  
  <div class="row">
    <div class="form-group">
      <label>Nombre del Director</label>
      <input type="text" id="ed-signame" placeholder="Ej. Executive Director"/>
    </div>
    <div class="form-group">
      <label>Cargo del Director</label>
      <input type="text" id="ed-sigrole" placeholder="Ej. Director Académico"/>
    </div>
  </div>

  <div class="form-group">
    <label>Texto alternativo del Logo (Si no usas imagen)</label>
    <input type="text" id="ed-logotext" placeholder="Ej. COURSERA"/>
    <div class="checkbox-group">
      <input type="checkbox" id="ed-logo-invert"/>
      <label for="ed-logo-invert" style="text-transform:none; font-size:.75rem;">Invertir color del logo a negro</label>
    </div>
  </div>

  <div class="row">
    <div class="form-group">
      <label>Archivo del Logo (Superior)</label>
      <input type="text" id="img-logo" placeholder="Ej. logo.png"/>
      <span class="prefix-info">Se enrutará automáticamente a: images/</span>
    </div>
    <div class="form-group">
      <label>Archivo de la Firma (Centro)</label>
      <input type="text" id="img-sig" placeholder="Ej. firma.png"/>
      <span class="prefix-info">Se enrutará automáticamente a: images/</span>
    </div>
  </div>

  <div class="row">
    <div class="form-group">
      <label>Archivo del QR (Inferior Izquierdo)</label>
      <input type="text" id="img-left" placeholder="Ej. qr.png"/>
      <span class="prefix-info">Se enrutará automáticamente a: images/</span>
    </div>
    <div class="form-group">
      <label>Archivo Sello Extra (Opcional)</label>
      <input type="text" id="img-right" placeholder="Ej. sello.png"/>
      <span class="prefix-info">Se enrutará automáticamente a: images/</span>
    </div>
  </div>

  <button class="btn-submit" onclick="generateLink()">Generar Certificado</button>

  <div class="result-box" id="link-result">
    <div class="result-title">🔗 ¡Enlace generado con éxito!</div>
    <input type="text" id="link-output" style="width:100%;" readonly/>
    <div class="result-actions">
      <button class="btn-small primary" onclick="copyGenLink()">Copiar Enlace</button>
      <a class="btn-small outline" id="link-open" target="_blank">Abrir Vista →</a>
    </div>
  </div>
</div>

<script>
function $(id){ return document.getElementById(id); }

function buildImagePath(val) {
  const cleanVal = val.trim();
  if (!cleanVal) return '';
  if (cleanVal.startsWith('images/')) return cleanVal;
  return 'images/' + cleanVal;
}

function generateLink(){
  const verifyId = $('ed-verify').value.trim() || 'CERT-PREVIEW';
  
  const data = {
    name:       $('ed-name').value,
    course:     $('ed-course').value,
    subtitle:   $('ed-subtitle').value,
    hours:      $('ed-hours').value,
    signame:    $('ed-signame').value,
    sigrole:    $('ed-sigrole').value,
    verify:     verifyId,
    logoText:   $('ed-logotext').value,
    logoInvert: $('ed-logo-invert').checked,
    logo:       buildImagePath($('img-logo').value),
    sig:        buildImagePath($('img-sig').value),
    left:       buildImagePath($('img-left').value),
    right:      buildImagePath($('img-right').value),
  };

  // Guardado de respaldo en LocalStorage
  localStorage.setItem('cert_' + verifyId, JSON.stringify(data));
  localStorage.setItem('cert_payload', JSON.stringify(data));

  // NUEVA LÓGICA: Codificamos todo el JSON de forma segura en Base64 para adjuntarlo a la URL
  const jsonStr = JSON.stringify(data);
  const encodedData = btoa(unescape(encodeURIComponent(jsonStr)));

  const origin = window.location.origin;
  let path = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/'));
  if(!path.endsWith('/')) path += '/';
  
  // La URL final contiene absolutamente todos los parámetros estructurados
  const url = origin + path + 'view.html#' + encodedData;
  
  $('link-output').value = url;
  $('link-open').href = url;
  $('link-result').style.display = 'block';
  $('link-output').select();
  $('link-result').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function copyGenLink(){
  const input = $('link-output');
  input.select();
  navigator.clipboard.writeText(input.value).catch(()=>{});
  const btn = input.nextElementSibling;
  btn.textContent = '✓ Copiado';
  setTimeout(()=> btn.textContent = 'Copiar Enlace', 2000);
}
</script>
</body>
</html>
