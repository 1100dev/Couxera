<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>En Mantenimiento</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #090909;
      --line: rgba(255,255,255,0.045);
      --accent: #ffffff;
      --muted: rgba(255,255,255,0.35);
      --border: rgba(255,255,255,0.08);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--accent);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    /* ── Geometric SVG background ── */
    .bg-pattern {
      position: fixed; inset: 0; z-index: 0;
      opacity: 1;
    }
    .bg-pattern svg {
      width: 100%; height: 100%;
    }

    /* ── Subtle vignette ── */
    .vignette {
      position: fixed; inset: 0; z-index: 1;
      background: radial-gradient(ellipse at center,
        transparent 30%,
        rgba(0,0,0,0.75) 100%);
      pointer-events: none;
    }

    /* ── Main layout ── */
    .page {
      position: relative; z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      min-height: 100vh;
      padding: 3rem 2rem 2.5rem;
      text-align: center;
    }

    /* ── Logo slot ── */
    .logo-area {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 80px;
    }
    .logo-placeholder {
      border: 1px dashed var(--border);
      padding: 1rem 2.5rem;
      border-radius: 4px;
      color: var(--muted);
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      /* Replace this div with your <img> tag */
    }
    /* If you add an <img> inside .logo-area, it shows instead */
    .logo-area img {
      max-height: 70px;
      max-width: 260px;
      object-fit: contain;
      filter: brightness(0) invert(1);
    }

    /* ── Center content ── */
    .center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      animation: fadeUp 1s cubic-bezier(.16,1,.3,1) both;
      animation-delay: .15s;
    }

    @keyframes fadeUp {
      from { opacity:0; transform: translateY(24px); }
      to   { opacity:1; transform: translateY(0); }
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      font-size: 0.68rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
      border: 1px solid var(--border);
      padding: .45rem 1.1rem;
      border-radius: 2px;
    }
    .tag::before {
      content: '';
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #fff;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: .3; transform: scale(.7); }
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3.5rem, 12vw, 9rem);
      letter-spacing: 0.04em;
      line-height: 1;
      color: #fff;
    }

    .subtitle {
      font-size: clamp(0.85rem, 2vw, 1rem);
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.05em;
      max-width: 380px;
      line-height: 1.7;
    }

    /* ── Thin divider line ── */
    .divider {
      width: 1px;
      height: 48px;
      background: linear-gradient(to bottom, transparent, var(--border), transparent);
      margin: .5rem auto;
    }

    /* ── Footer ── */
    .footer {
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.18);
    }
  </style>
</head>
<body>

  <!-- Geometric background -->
  <div class="bg-pattern">
    <svg viewBox="0 0 600 600" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="hex" x="0" y="0" width="120" height="104" patternUnits="userSpaceOnUse">
          <!-- isometric cube grid -->
          <!-- top face -->
          <polygon points="60,2 118,32 118,72 60,102 2,72 2,32"
            fill="none" stroke="rgba(255,255,255,0.055)" stroke-width="0.8"/>
          <!-- inner lines -->
          <line x1="60" y1="2"  x2="60" y2="52"  stroke="rgba(255,255,255,0.04)" stroke-width="0.6"/>
          <line x1="2"  y1="32" x2="60" y2="52"  stroke="rgba(255,255,255,0.04)" stroke-width="0.6"/>
          <line x1="118" y1="32" x2="60" y2="52" stroke="rgba(255,255,255,0.04)" stroke-width="0.6"/>
          <!-- offset row -->
          <polygon points="60,54 118,84 118,124 60,154 2,124 2,84"
            fill="none" stroke="rgba(255,255,255,0.055)" stroke-width="0.8"/>
          <line x1="60" y1="54"  x2="60" y2="104" stroke="rgba(255,255,255,0.04)" stroke-width="0.6"/>
          <line x1="2"  y1="84"  x2="60" y2="104" stroke="rgba(255,255,255,0.04)" stroke-width="0.6"/>
          <line x1="118" y1="84" x2="60" y2="104" stroke="rgba(255,255,255,0.04)" stroke-width="0.6"/>
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="var(--bg)"/>
      <rect width="100%" height="100%" fill="url(#hex)"/>
    </svg>
  </div>

  <div class="vignette"></div>

  <main class="page">

    <!-- LOGO AREA: replace .logo-placeholder with your <img> -->
    <div class="logo-area">
      <div class="logo-placeholder">Tu Logo Aquí</div>
      <<img src="logo.svg" alt="Logo" />
    </div>

    <!-- CENTER -->
    <div class="center">
      <div class="tag">Sistema temporalmente fuera de línea</div>
      <h1>En Mantenimiento</h1>
      <div class="divider"></div>
      <p class="subtitle">
        Estamos realizando mejoras para ofrecerte una mejor experiencia.<br>
        Volvemos pronto.
      </p>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
      &copy; <span id="yr"></span> &mdash; Todos los derechos reservados
    </footer>

  </main>

  <script>
    document.getElementById('yr').textContent = new Date().getFullYear();
  </script>
</body>
</html>
