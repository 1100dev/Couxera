<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>En Mantenimiento</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #090909;
      --line: rgba(255,255,255,0.045);
      --accent: #ffffff;
      --muted: rgba(255,255,255,0.35);
      --border: rgba(255,255,255,0.08);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--accent);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    /* ── Geometric SVG background ── */
    .bg-pattern {
      position: fixed; inset: 0; z-index: 0;
      opacity: 1;
    }
    .bg-pattern svg {
      width: 100%; height: 100%;
    }

    .vignette {
      position: fixed; inset: 0; z-index: 1;
      background: radial-gradient(circle at center, transparent 10%, rgba(0,0,0,0.8) 100%);
      pointer-events: none;
    }

    .page {
      position: relative; z-index: 2;
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 2rem; box-sizing: border-box;
    }

    .logo-area {
      margin-bottom: 2rem;
      animation: fadeInDown 0.8s ease out;
    }
    .logo-placeholder {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.2rem; letter-spacing: 3px;
      color: var(--accent); border: 1px solid var(--border);
      padding: 0.5rem 1.5rem; border-radius: 4px;
      background: rgba(255,255,255,0.01);
      backdrop-filter: blur(4px);
    }

    .content-box {
      text-align: center; max-width: 460px;
      animation: fadeInUp 0.9s cubic-bezier(0.16, 1, 0.3, 1);
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 4rem; font-weight: 400;
      letter-spacing: 1px; line-height: 1;
      margin-bottom: 1rem; text-transform: uppercase;
    }

    p {
      font-size: 1rem; font-weight: 300;
      color: var(--muted); line-height: 1.6;
      margin-bottom: 2.5rem; padding: 0 1rem;
    }

    /* Minimalist Progress indicator */
    .status-container {
      width: 180px; margin: 0 auto;
      display: flex; flex-direction: column; gap: 0.6rem;
    }
    .bar-bg {
      width: 100%; height: 2px; background: rgba(255,255,255,0.07);
      border-radius: 2px; overflow: hidden; position: relative;
    }
    .bar-fill {
      position: absolute; top: 0; left: 0; height: 100%; width: 65%;
      background: var(--accent); border-radius: 2px;
    }
    .status-text {
      font-size: 0.75rem; font-weight: 400;
      text-transform: uppercase; letter-spacing: 2px; color: var(--muted);
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-15px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(25px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="bg-pattern">
    <svg xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="hex" width="116" height="200" patternUnits="userSpaceOnUse" patternTransform="scale(0.4)">
          <polygon points="58,0 116,33.5 116,100.5 58,134 0,100.5 0,33.5"
            fill="none" stroke="var(--line)" stroke-width="0.8"/>
          <polygon points="58,67 116,100.5 116,167.5 58,201 0,167.5 0,100.5"
            fill="none" stroke="var(--line)" stroke-width="0.8"/>
          <line x1="58" y1="0"  x2="58" y2="67" stroke="rgba(255,255,255,0.02)" stroke-width="0.6"/>
          <line x1="116" y1="33.5" x2="58" y2="67" stroke="rgba(255,255,255,0.02)" stroke-width="0.6"/>
          <line x1="0" y1="33.5"  x2="58" y2="67" stroke="rgba(255,255,255,0.02)" stroke-width="0.6"/>
          <line x1="58" y1="134" x2="58" y2="201" stroke="rgba(255,255,255,0.02)" stroke-width="0.6"/>
          <line x1="116" y1="167.5" x2="58" y2="201" stroke="rgba(255,255,255,0.02)" stroke-width="0.6"/>
          <line x1="0" y1="167.5"  x2="58" y2="201" stroke="rgba(255,255,255,0.02)" stroke-width="0.6"/>
          <!-- offset row -->
          <polygon points="60,54 118,84 118,124 60,154 2,124 2,84"
            fill="none" stroke="rgba(255,255,255,0.055)" stroke-width="0.8"/>
          <line x1="60" y1="54"  x2="60" y2="104" stroke="rgba(255,255,255,0.04)" stroke-width="0.6"/>
          <line x1="2"  y1="84"  x2="60" y2="104" stroke="rgba(255,255,255,0.04)" stroke-width="0.6"/>
          <line x1="118" y1="84" x2="60" y2="104" stroke="rgba(255,255,255,0.04)" stroke-width="0.6"/>
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="var(--bg)"/>
      <rect width="100%" height="100%" fill="url(#hex)"/>
    </svg>
  </div>

  <div class="vignette"></div>

  <main class="page">
    <div class="logo-area">
      <div class="logo-placeholder">PLATAFORMA</div>
    </div>

    <div class="content-box">
      <h1>Estrenamos Pronto</h1>
      <p>Estamos refinando detalles en los módulos de diseño para ofrecerte la mejor experiencia de usuario en la creación de credenciales.</p>
      
      <div class="status-container">
        <div class="bar-bg">
          <div class="bar-fill"></div>
        </div>
        <div class="status-text">Actualizando código...</div>
      </div>
    </div>
  </main>

</body>
</html>
